documentationUrl: https://docs.airbyte.com/integrations/sources/logos-journeys
connectionSpecification:
  $schema: http://json-schema.org/draft-07/schema#
  title: Logos Journeys Source Spec
  type: object
  required:
    - owner
    - project_number
    - github_token
  properties:
    owner:
      type: string
      description: "GitHub user or org that owns the project board (e.g. logos-co)"
      default: "logos-co"
    project_number:
      type: integer
      description: "GitHub Projects v2 board number (e.g. 12)"
      default: 12
    github_token:
      type: string
      description: "GitHub PAT with `repo` and `read:project` scopes"
      airbyte_secret: true
    roadmap_repo:
      type: string
      description: "Roadmap repo for milestone completion lookup"
      default: "logos-co/roadmap"
