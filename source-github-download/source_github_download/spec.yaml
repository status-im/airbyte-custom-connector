documentationUrl: https://docs.airbyte.com/integrations/sources/github-download
connectionSpecification:
  $schema: http://json-schema.org/draft-07/schema#
  title: GitHub Download Source Spec
  type: object
  required:
    - repositories
  additionalProperties: false
  properties:
    repositories:
      type: array
      title: Repositories
      description: "List of GitHub repositories in owner/repo format to fetch release download counts from."
      items:
        type: string
      examples: ["logos-co/logos-app", "nicotine-plus/nicotine-plus"]
      order: 1
